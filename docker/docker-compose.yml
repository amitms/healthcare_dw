version: '3.9'

services:
  oracle-db:
    image: gvenzl/oracle-xe:23.1.0
    container_name: XEPDB1
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=texas
    volumes:
      - oracle-data:/opt/oracle/oradata

  airflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthcare-airflow
    ports:
      - "8080:8080"
    depends_on:
      - oracle-db
    volumes:
      - ./etl:/opt/etl
      - ./airflow/dags:/opt/airflow/dags
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False

volumes:
  oracle-data: